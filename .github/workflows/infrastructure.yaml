name: Apply production infrastructure

on:
  workflow_dispatch:
    inputs:
      apply_domain:
        description: Apply the approval-gated Amplify domain association
        required: true
        default: false
        type: boolean
      rollback_to_netlify:
        description: Remove the Amplify domain association and restore Netlify web records
        required: true
        default: false
        type: boolean
      cutover_confirmation:
        description: Enter APPROVAL_GATE_1_CONFIRMED when apply_domain is true
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  cloudformation:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: production-infrastructure
    concurrency:
      group: sarabeth-production-infrastructure
      cancel-in-progress: false
    env:
      AWS_REGION: us-west-2
      EXPECTED_AWS_ACCOUNT: "015989770400"
      CLOUDFORMATION_EXECUTION_ROLE_ARN: ${{ vars.CLOUDFORMATION_EXECUTION_ROLE_ARN }}
      OIDC_PROVIDER_ARN: ${{ vars.OIDC_PROVIDER_ARN }}
      WORKLOAD_PERMISSIONS_BOUNDARY_ARN: ${{ vars.WORKLOAD_PERMISSIONS_BOUNDARY_ARN }}
      AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure protected infrastructure credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.INFRASTRUCTURE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: sarabeth-amplify-infrastructure

      - name: Verify production account
        run: |
          account=$(aws sts get-caller-identity --query Account --output text)
          if [[ "$account" != "$EXPECTED_AWS_ACCOUNT" ]]; then
            echo "Refusing to mutate unexpected AWS account $account" >&2
            exit 1
          fi

      - name: Validate CloudFormation templates
        run: |
          for template in infrastructure/cloudformation/*.yaml; do
            aws cloudformation validate-template --template-body "file://$template" >/dev/null
          done

      - name: Apply hosting stack
        run: |
          aws cloudformation deploy \
            --stack-name sarabeth-amplify-hosting \
            --template-file infrastructure/cloudformation/hosting.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            --parameter-overrides \
              GitHubOidcProviderArn="$OIDC_PROVIDER_ARN" \
              WorkloadPermissionsBoundaryArn="$WORKLOAD_PERMISSIONS_BOUNDARY_ARN" \
            --no-fail-on-empty-changeset \
            --tags Project=sarabeth-studio Environment=production

      - name: Validate canonical www redirects
        if: inputs.rollback_to_netlify == false
        run: |
          domain_status=$(aws amplify get-domain-association \
            --app-id "$AMPLIFY_APP_ID" \
            --domain-name sarabethbelon.com \
            --query 'domainAssociation.domainStatus' \
            --output text 2>/dev/null || true)
          if [[ "$domain_status" != "AVAILABLE" ]]; then
            echo "Skipping canonical redirect validation because the production domain is not available"
            exit 0
          fi

          paths=(
            "/?redirect-check=$GITHUB_RUN_ID"
            "/about?redirect-check=$GITHUB_RUN_ID"
            "/contact?redirect-check=$GITHUB_RUN_ID"
            "/engagements?redirect-check=$GITHUB_RUN_ID"
            "/lessons?redirect-check=$GITHUB_RUN_ID"
            "/media?redirect-check=$GITHUB_RUN_ID"
          )
          for _ in {1..60}; do
            all_redirects_valid=true
            for path in "${paths[@]}"; do
              headers=$(mktemp)
              status=$(curl --silent --show-error --max-time 30 \
                --dump-header "$headers" \
                --output /dev/null \
                --write-out '%{http_code}' \
                "https://www.sarabethbelon.com${path}" || true)
              location=$(awk -F ': ' 'tolower($1) == "location" { print $2 }' "$headers" | tail -1 | tr -d '\r')
              rm -f "$headers"
              expected_location="https://sarabethbelon.com${path}"
              if [[ "$status" != "301" || "$location" != "$expected_location" ]]; then
                all_redirects_valid=false
                break
              fi
            done
            if [[ "$all_redirects_valid" == "true" ]]; then
              echo "Canonical www redirects preserve all production paths and query strings"
              exit 0
            fi
            sleep 10
          done
          echo "Canonical www redirects did not stabilize" >&2
          exit 1

      - name: Verify domain operation
        env:
          CUTOVER_CONFIRMATION: ${{ inputs.cutover_confirmation }}
        run: |
          if [[ "${{ inputs.apply_domain }}" == "true" && "${{ inputs.rollback_to_netlify }}" == "true" ]]; then
            echo "apply_domain and rollback_to_netlify are mutually exclusive" >&2
            exit 1
          fi
          if [[ "${{ inputs.apply_domain }}" == "true" && "$CUTOVER_CONFIRMATION" != "APPROVAL_GATE_1_CONFIRMED" ]]; then
            echo "Domain association requires approval gate 1 confirmation" >&2
            exit 1
          fi

      - name: Remove Amplify domain association before rollback
        if: inputs.rollback_to_netlify
        run: |
          stack_status=$(aws cloudformation describe-stacks \
            --stack-name sarabeth-amplify-domain \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo NOT_FOUND)
          if [[ "$stack_status" == "ROLLBACK_COMPLETE" ]]; then
            aws cloudformation delete-stack --stack-name sarabeth-amplify-domain
            aws cloudformation wait stack-delete-complete --stack-name sarabeth-amplify-domain
          elif [[ "$stack_status" != "NOT_FOUND" ]]; then
            aws cloudformation deploy \
              --stack-name sarabeth-amplify-domain \
              --template-file infrastructure/cloudformation/domain.yaml \
              --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
              --parameter-overrides \
                AmplifyAppId="$AMPLIFY_APP_ID" \
                AssociateDomain=false \
              --no-fail-on-empty-changeset \
              --tags Project=sarabeth-studio Environment=production
          fi

      - name: Apply DNS stack without changing delegation
        if: inputs.apply_domain == false
        run: |
          parameter_overrides=()
          if [[ "${{ inputs.rollback_to_netlify }}" == "true" ]]; then
            parameter_overrides=(--parameter-overrides WebTarget=Netlify)
          fi
          aws cloudformation deploy \
            --stack-name sarabeth-amplify-dns \
            --template-file infrastructure/cloudformation/dns.yaml \
            --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            "${parameter_overrides[@]}" \
            --no-fail-on-empty-changeset \
            --tags Project=sarabeth-studio Environment=production

      - name: Preserve core stacks from accidental deletion
        run: |
          for stack in sarabeth-amplify-hosting sarabeth-amplify-dns; do
            aws cloudformation update-termination-protection \
              --enable-termination-protection \
              --stack-name "$stack" >/dev/null
          done

      - name: Apply approval-gated domain association and DNS
        if: inputs.apply_domain
        id: domain_association
        continue-on-error: true
        run: |
          aws cloudformation deploy \
            --stack-name sarabeth-amplify-domain \
            --template-file infrastructure/cloudformation/domain.yaml \
            --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            --parameter-overrides \
              AmplifyAppId="$AMPLIFY_APP_ID" \
              AssociateDomain=true \
            --no-fail-on-empty-changeset \
            --tags Project=sarabeth-studio Environment=production

          domain=''
          for _ in {1..60}; do
            domain=$(aws amplify get-domain-association \
              --app-id "$AMPLIFY_APP_ID" \
              --domain-name sarabethbelon.com \
              --output json)
            domain_status=$(jq -r '.domainAssociation.domainStatus' <<< "$domain")
            if [[ "$domain_status" == "FAILED" ]]; then
              jq -r '.domainAssociation.statusReason' <<< "$domain" >&2
              exit 1
            fi
            certificate_record=$(jq -r '.domainAssociation.certificateVerificationDNSRecord // empty' <<< "$domain")
            cloudfront_target=$(jq -r '.domainAssociation.subDomains[0].dnsRecord | split(" ") | map(select(length > 0)) | last' <<< "$domain")
            if [[ -n "$certificate_record" && -n "$cloudfront_target" && "$cloudfront_target" != "<pending>" ]]; then
              break
            fi
            sleep 10
          done
          certificate_name=$(awk '{print $1}' <<< "$certificate_record")
          certificate_type=$(awk '{print $2}' <<< "$certificate_record")
          certificate_value=$(awk '{print $3}' <<< "$certificate_record")
          if [[ "$certificate_type" != "CNAME" || -z "$certificate_name" || -z "$certificate_value" || -z "$cloudfront_target" ]]; then
            echo "Amplify did not return complete domain DNS records" >&2
            exit 1
          fi

          aws cloudformation deploy \
            --stack-name sarabeth-amplify-dns \
            --template-file infrastructure/cloudformation/dns.yaml \
            --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            --parameter-overrides \
              WebTarget=Amplify \
              AmplifyCloudFrontTarget="$cloudfront_target" \
              AmplifyCertificateRecordName="$certificate_name" \
              AmplifyCertificateRecordValue="$certificate_value" \
            --no-fail-on-empty-changeset \
            --tags Project=sarabeth-studio Environment=production

          for _ in {1..360}; do
            domain_status=$(aws amplify get-domain-association \
              --app-id "$AMPLIFY_APP_ID" \
              --domain-name sarabethbelon.com \
              --query 'domainAssociation.domainStatus' \
              --output text)
            [[ "$domain_status" == "AVAILABLE" ]] && exit 0
            if [[ "$domain_status" == "FAILED" ]]; then
              aws amplify get-domain-association \
                --app-id "$AMPLIFY_APP_ID" \
                --domain-name sarabethbelon.com \
                --query 'domainAssociation.statusReason' \
                --output text >&2
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for the Amplify domain to become available" >&2
          exit 1

      - name: Restore Netlify records after domain failure
        if: inputs.apply_domain && steps.domain_association.outcome == 'failure'
        run: |
          aws cloudformation deploy \
            --stack-name sarabeth-amplify-dns \
            --template-file infrastructure/cloudformation/dns.yaml \
            --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            --parameter-overrides WebTarget=Netlify \
            --no-fail-on-empty-changeset \
            --tags Project=sarabeth-studio Environment=production

      - name: Remove failed domain association after DNS rollback
        if: inputs.apply_domain && steps.domain_association.outcome == 'failure'
        continue-on-error: true
        run: |
          stack_status=$(aws cloudformation describe-stacks \
            --stack-name sarabeth-amplify-domain \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo NOT_FOUND)
          if [[ "$stack_status" == "ROLLBACK_COMPLETE" ]]; then
            aws cloudformation delete-stack --stack-name sarabeth-amplify-domain
            aws cloudformation wait stack-delete-complete --stack-name sarabeth-amplify-domain
          elif [[ "$stack_status" != "NOT_FOUND" ]]; then
            aws cloudformation deploy \
              --stack-name sarabeth-amplify-domain \
              --template-file infrastructure/cloudformation/domain.yaml \
              --role-arn "$CLOUDFORMATION_EXECUTION_ROLE_ARN" \
              --parameter-overrides \
                AmplifyAppId="$AMPLIFY_APP_ID" \
                AssociateDomain=false \
              --no-fail-on-empty-changeset \
              --tags Project=sarabeth-studio Environment=production
          fi

      - name: Preserve domain stack from accidental deletion
        if: inputs.apply_domain || inputs.rollback_to_netlify
        run: |
          if aws cloudformation describe-stacks --stack-name sarabeth-amplify-domain >/dev/null 2>&1; then
            aws cloudformation update-termination-protection \
              --enable-termination-protection \
              --stack-name sarabeth-amplify-domain >/dev/null
          fi

      - name: Fail after domain rollback
        if: inputs.apply_domain && steps.domain_association.outcome == 'failure'
        run: |
          echo "Domain association failed; Netlify web records were restored" >&2
          exit 1
