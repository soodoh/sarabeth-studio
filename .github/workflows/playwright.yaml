name: Playwright

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Playwright tests
        run: docker compose -f compose.playwright.yaml run --build --rm playwright

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_attempt }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
