name: Playwright

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build deterministic Playwright image
        run: docker build --file Dockerfile.playwright --tag sarabeth-playwright .

      - name: Run Playwright tests
        run: docker run --rm --ipc=host sarabeth-playwright
