version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24.18.0
        - nvm use 24.18.0
        - npm install --global bun@1.3.14
        - node --version && bun --version
        - export CONTENTFUL_SECRET_FILE="$(mktemp)"
        - chmod 600 "$CONTENTFUL_SECRET_FILE"
        - aws secretsmanager get-secret-value --secret-id "$CONTENTFUL_SECRET_ID" --query SecretString --output text > "$CONTENTFUL_SECRET_FILE"
        - export CONTENTFUL_SPACE_ID="$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).CONTENTFUL_SPACE_ID' "$CONTENTFUL_SECRET_FILE")"
        - export CONTENTFUL_ACCESS_TOKEN="$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).CONTENTFUL_ACCESS_TOKEN' "$CONTENTFUL_SECRET_FILE")"
        - test -n "$CONTENTFUL_SPACE_ID" && test "$CONTENTFUL_SPACE_ID" != "undefined"
        - test -n "$CONTENTFUL_ACCESS_TOKEN" && test "$CONTENTFUL_ACCESS_TOKEN" != "undefined"
        - rm -f "$CONTENTFUL_SECRET_FILE"
        - unset CONTENTFUL_SECRET_FILE
        - bun install --frozen-lockfile
    build:
      commands:
        - NITRO_PRESET=aws-amplify bun run build
        - bun run prepare:amplify
        - bun run validate:amplify
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - ~/.bun/install/cache/**/*
